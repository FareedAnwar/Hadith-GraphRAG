# Hadith GraphRAG — Docker Compose
#
# Services:
#   neo4j     : Graph database
#   ollama    : Local embedding + LLM server
#   api       : FastAPI backend
#   streamlit : Streamlit frontend
#
# One-time setup helpers:
#   docker compose --profile setup up ollama-pull
#   docker compose run --rm loader
#   docker compose run --rm embedder

services:
  neo4j:
    image: neo4j:5.20.0
    container_name: hadith_neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"   # Neo4j Browser
      - "7687:7687"   # Bolt protocol
    environment:
      NEO4J_AUTH: neo4j/hadith2026
    volumes:
      - ./neo4j_data/data:/data
      - ./neo4j_data/logs:/logs
      - ./neo4j_data/import:/import
      - ./neo4j_data/plugins:/plugins
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p hadith2026 'RETURN 1;' >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 15

  ollama:
    image: ollama/ollama:latest
    container_name: hadith_ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 10s
      retries: 15

  # Pull the local models used by embeddings.py and graphrag.py.
  # Run manually:
  #   docker compose --profile setup up ollama-pull
  ollama-pull:
    image: ollama/ollama:latest
    container_name: hadith_ollama_pull
    profiles: ["setup"]
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "ollama pull ${OLLAMA_EMBED_MODEL:-nomic-embed-text:latest}
      && ollama pull ${OLLAMA_LLM_MODEL:-qwen2.5:3b}"
    depends_on:
      ollama:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: hadith_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: hadith2026
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_EMBED_MODEL: ${OLLAMA_EMBED_MODEL:-nomic-embed-text:latest}
      OLLAMA_LLM_MODEL: ${OLLAMA_LLM_MODEL:-qwen2.5:3b}
    env_file:
      - .env
    depends_on:
      neo4j:
        condition: service_healthy
      ollama:
        condition: service_healthy
    volumes:
      - ./src:/app/src

  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    container_name: hadith_streamlit
    restart: unless-stopped
    ports:
      - "8501:8501"
    environment:
      API_URL: http://api:8000
    env_file:
      - .env
    depends_on:
      - api
    volumes:
      - ./src:/app/src

  # One-off service to load src/data/hadith_data.py into Neo4j.
  # Run:
  #   docker compose run --rm loader
  loader:
    build:
      context: .
      dockerfile: Dockerfile.api
    profiles: ["tools"]
    command: ["python", "hadith_loader.py"]
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: hadith2026
    env_file:
      - .env
    depends_on:
      neo4j:
        condition: service_healthy
    volumes:
      - ./src:/app/src

  # One-off service to create narrator embeddings after loading the graph.
  # Run:
  #   docker compose run --rm embedder
  embedder:
    build:
      context: .
      dockerfile: Dockerfile.api
    profiles: ["tools"]
    command: ["python", "embeddings.py"]
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: hadith2026
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_EMBED_MODEL: ${OLLAMA_EMBED_MODEL:-nomic-embed-text:latest}
    env_file:
      - .env
    depends_on:
      neo4j:
        condition: service_healthy
      ollama:
        condition: service_healthy
    volumes:
      - ./src:/app/src

volumes:
  ollama_data:
